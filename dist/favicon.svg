<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35" />
      <stop offset="100%" stop-color="#FF9F1C" />
    </linearGradient>
  </defs>
  <!-- Background with slight roundness -->
  <rect width="100" height="100" rx="20" fill="#09090D" />
  <rect width="90" height="90" x="5" y="5" rx="16" fill="#0B0B10" stroke="url(#glow)" stroke-width="2" />
  
  <!-- Terminal cursor and 'R' letter -->
  <text x="50%" y="65%" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="52" fill="url(#glow)" text-anchor="middle">R</text>
  
  <!-- Code bracket symbol -->
  <path d="M 22 35 L 12 50 L 22 65" stroke="#FF6B35" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M 78 35 L 88 50 L 78 65" stroke="#FF9F1C" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
